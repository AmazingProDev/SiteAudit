<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>360° Telecom Site Audit Viewer</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?v=3">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <div class="setup-card glass-panel">
            <h1>Site Audit Configuration</h1>
            <p class="subtitle">Upload 12 photos (taken every 30°) and enter the site's center coordinates.</p>
            
            <div class="form-group">
                <label for="photo-upload">Upload Photos (12 required)</label>
                <div class="file-drop-area">
                    <span class="file-msg">Drag & drop 12 images or a single Excel Audit (.xlsx) here</span>
                    <input type="file" id="photo-upload" multiple accept="image/*,.xlsx">
                </div>
                <div id="file-count" class="info-text">0/12 selected</div>
            </div>

            <div class="form-group" style="display: none;">
                <label>Central GPS Coordinates</label>
                <div class="input-row">
                    <input type="number" id="lat-input" step="any" placeholder="Latitude (e.g. 48.8584)" value="48.8584">
                    <input type="number" id="lng-input" step="any" placeholder="Longitude (e.g. 2.2945)" value="2.2945">
                </div>
            </div>

            <button id="generate-btn" disabled>Generate 360° View</button>
        </div>
    </div>

    <!-- Viewer Screen -->
    <div id="viewer-screen" class="screen">
        <button id="restart-btn" style="width: 100%; background: linear-gradient(90deg, #1f6feb, #4da3ff); color: white; border: none; padding: 18px; font-size: 20px; font-weight: 700; letter-spacing: 1px; cursor: pointer; text-align: center; border-radius: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.6); z-index: 1000; position: relative; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 10px;">
            NEW SITE AUDIT
        </button>

        <div style="display: none;">
            <h1 class="logo">360° Telecom Site Audit View</h1>
            <select id="config-select">
                <option value="avant">Avant Optimisation</option>
                <option value="apres">Après Optimisation</option>
            </select>
            <div id="angle-badge" class="badge">Azimuth: 0°</div>
        </div>
        
        <!-- Sector Heads Up Display -->
        <div id="sector-hud" class="sector-hud">
            <div class="sector-hud-title" id="sector-hud-title">Secteur View</div>
            <img id="sector-hud-img" src="" alt="Sector Antenna Phase">
        </div>

        <div class="split-layout">
            <!-- 360 Video Panel -->
            <div class="panel photo-panel">
                <div id="panorama-container">
                    <div id="panorama-track"></div>
                    <div class="drag-hint">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 17l4 4 4-4M8 7l4-4 4 4M12 22V2"/></svg>
                        <span>Drag left/right to look around</span>
                    </div>
                </div>
            </div>

            <!-- Satellite Map Panel -->
            <div class="panel map-panel">
                <div id="site-name-hud" class="site-name-hud">
                    <span id="display-site-name">Unknown Site</span>
                    <button id="export-kml-btn" title="Export to Google Earth">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        KML
                    </button>
                </div>
                <div id="map-info-hud" class="map-info-hud">
                    <div class="hud-row"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg> <span id="hud-cgps">--</span></div>
                    <div class="hud-row"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="m16 10-4-6-4 6"/><path d="M12 4v16"/></svg> <span id="hud-direction">--</span></div>
                    <div class="hud-row"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/><circle cx="12" cy="12" r="4"/></svg> <span id="hud-azimuts">--</span></div>
                </div>
                <div id="map-outer-wrapper" style="position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; will-change: transform; z-index: 10;">
                    <div id="map-wrapper" style="position: absolute; width: 300%; height: 300%; top: -100%; left: -100%; pointer-events: auto; transform-origin: center center;">
                        <div id="map" style="width: 100%; height: 100%;"></div>
                    </div>
                </div>
                <!-- Mini Compass Overlay -->
                <div id="compass-overlay">
                    <svg class="compass-arrow" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2l4 10-4-2-4 2 4-10z" fill="#ff3333" stroke="#ff3333"/>
                        <path d="M12 22l-4-10 4 2 4-2-4 10z" fill="#ffffff" stroke="#ffffff"/>
                    </svg>
                    <div class="compass-label">N</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- JSZip for Excel Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- App Script -->
    <script src="app.js?v=4"></script>
</body>
</html>
